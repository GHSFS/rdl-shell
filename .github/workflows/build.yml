name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build rdl_shell.dll (x64)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Build release DLL
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Verify DLL exports
        shell: pwsh
        run: |
          $dll = "target/x86_64-pc-windows-msvc/release/rdl_shell.dll"
          if (-not (Test-Path $dll)) { throw "DLL not found" }
          $size = (Get-Item $dll).Length
          Write-Host "Built $dll ($size bytes)"
          # dumpbin lives next to MSVC link.exe — find it via vswhere.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsroot = & $vswhere -latest -property installationPath
          $dumpbin = Get-ChildItem -Path $vsroot -Recurse -Filter dumpbin.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($dumpbin) {
            & $dumpbin.FullName /EXPORTS $dll | Select-String 'Dll(GetClassObject|CanUnloadNow|RegisterServer|UnregisterServer)'
          }

      - name: Stage release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/rdl_shell.dll dist/rdl-shell.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdl-shell-x64
          path: target/x86_64-pc-windows-msvc/release/rdl_shell.dll
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/rdl-shell.dll
          generate_release_notes: true
